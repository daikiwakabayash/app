<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D筋肉・骨格ビューア｜整体スタッフ研修デモ</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>🦴</text></svg>" />
  <link rel="stylesheet" href="css/styles.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/build/three.module.js",
      "three/addons/": "./vendor/three/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div class="app">
    <!-- ヘッダー / 検索 -->
    <header class="topbar">
      <div class="brand">
        <span class="logo">解剖ビューア</span>
        <span class="sub">整体・研修向けデモ版</span>
      </div>
      <div class="search-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input id="search" type="text" placeholder="筋肉名・作用・神経で検索（例：僧帽筋、外転、坐骨神経）" />
        <button id="searchClear" title="クリア">×</button>
      </div>
      <div class="topbar-actions">
        <button class="tbtn" id="toggleMuscle">筋肉：表示</button>
      </div>
    </header>

    <!-- メイン -->
    <div class="main">
      <!-- 3Dビュー -->
      <div id="viewport">
        <div class="info" id="info"></div>

        <div class="view-controls">
          <button id="btnFront">前面</button>
          <button id="btnBack">背面</button>
          <button id="btnReset">リセット</button>
        </div>

        <div class="hint">
          <b>操作：</b> ドラッグで回転 ／ ホイールで拡大縮小<br />
          <b>クリック：</b> 筋肉を選択して詳細を表示<br />
          右の一覧からも選べます
        </div>
      </div>

      <!-- 一覧サイドバー -->
      <aside class="sidebar" id="sidebar">
        <div class="region-tabs" id="regionTabs"></div>
        <div class="list-head">筋肉一覧（タップで3Dにフォーカス）</div>
        <div class="list" id="list"></div>
      </aside>
      <button class="panel-toggle" id="panelToggle" title="一覧の表示切替">⟨</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
